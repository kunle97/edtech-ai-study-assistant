services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: learnpath-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-learnpath}
      POSTGRES_USER: ${POSTGRES_USER:-learnpath}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-learnpath}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-learnpath} -d ${POSTGRES_DB:-learnpath}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: learnpath-redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  redis_data:
