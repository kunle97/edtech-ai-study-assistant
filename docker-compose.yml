services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: learnpath-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-learnpath}
      POSTGRES_USER: ${POSTGRES_USER:-learnpath}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-learnpath}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-learnpath} -d ${POSTGRES_DB:-learnpath}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: learnpath-redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: learnpath-api
    command: >
      sh -c "
      alembic upgrade head &&
      python -m uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      "
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg2://learnpath:learnpath@postgres:5432/learnpath
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: learnpath-worker
    command: >
      python -m celery
      -A app.worker.celery_app:celery_app
      worker
      --loglevel=info
      --pool=solo
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg2://learnpath:learnpath@postgres:5432/learnpath
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
